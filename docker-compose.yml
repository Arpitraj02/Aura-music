version: '3.9'

services:
  aura:
    build: .
    restart: unless-stopped
    ports:
      - '${PORT:-3001}:3001'
    environment:
      - PORT=3001
      - NODE_ENV=production
      - APP_URL=${APP_URL:-http://localhost:3001}
    volumes:
      # Persist yt-dlp cache so it isn't re-downloaded on restart
      - ytdlp-cache:/root/.cache/yt-dlp
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/api/health']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ytdlp-cache:
